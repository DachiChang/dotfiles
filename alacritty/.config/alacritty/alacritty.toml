[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 10
decorations = "buttonless" # full | none | transparent | buttonless
# opacity = 0.8
# blur = true
option_as_alt = "Both"
startup_mode = "Maximized"

## Font install
# brew install font-meslo-lg-nerd-font font-jetbrains-mono-nerd-font
[font]
# normal.family = "JetBrainsMono Nerd Font Mono"
# normal.family = "Hack Nerd Font Mono"
normal.family = "MesloLGS Nerd Font Mono"
size = 14
offset.x = 0
offset.y = 2
glyph_offset.x = 0
glyph_offset.y = 1

[colors.primary]
foreground = "#cac5b5"
background = "#1c1c1c"

[keyboard]
# Shift+Return sends ESC+Enter (same as Option+Enter) to work in tmux
bindings = [{ key = "Return", mods = "Shift", chars = "\u001b\r" }]
